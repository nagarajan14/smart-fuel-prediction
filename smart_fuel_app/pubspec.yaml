name: smart_fuel_app
description: Smart Fuel Monitoring and Distance Prediction App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Core Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  
  # State Management
  provider: ^6.1.1
  
  # UI & Charts
  fl_chart: ^0.65.0
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  google_fonts: ^6.1.0
  
  # Helpers
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
